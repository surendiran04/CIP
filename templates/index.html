<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Attendance System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .video-container {
            position: relative;
            width: 100%;
            margin: 20px 0;
        }

        img#video-feed {
            width: 100%;
            max-width: 640px;
            border: 2px solid #ddd;
            border-radius: 4px;
        }

        .controls {
            margin: 20px 0;
        }

        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        button#stopCamera {
            background-color: #f44336;
        }

        button#stopCamera:hover {
            background-color: #d32f2f;
        }

        button#clearData {
            background-color: #ff9800;
        }

        button#clearData:hover {
            background-color: #e68a00;
        }

        #name-container {
            display: none;
            margin: 20px 0;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        input[type="text"] {
            padding: 10px;
            width: 200px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }

        .status {
            margin-top: 20px;
            font-style: italic;
            color: #666;
        }

        .admin-controls {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>FACE RECOGNITION ATTENDANCE SYSTEM</h1>
        
        <div class="controls">
            <button onclick="registerFace()">Register New Face</button>
            <button onclick="startCamera()">Start Recognition</button>
            <button id="stopCamera" onclick="stopCamera()">Stop Camera</button>
        </div>
        
        <div class="video-container">
            <img id="video-feed" src="" alt="Camera will appear here">
        </div>
        
        <div id="name-container">
            <h3>Register New Person</h3>
            <input type="text" id="name" placeholder="Enter full name">
            <button onclick="submitFace()">Submit</button>
            <p class="status" id="registration-status"></p>
        </div>
        
        <p class="status" id="system-status">System ready. Click "Start Recognition" to begin.</p>
        
        <div class="admin-controls">
            <h3>Administrator Controls</h3>
            <button id="clearData" onclick="clearAllData()">Clear All Face Data</button>
        </div>
    </div>

    <script>
        let videoStream = null;
        const statusElement = document.getElementById("system-status");
        const regStatusElement = document.getElementById("registration-status");

        function registerFace() {
            startCamera();
            document.getElementById("name-container").style.display = "block";
            statusElement.textContent = "Please look at the camera and enter your name.";
        }

        function submitFace() {
            const name = document.getElementById("name").value.trim();
            if (!name) {
                regStatusElement.textContent = "Please enter your name!";
                return;
            }

            regStatusElement.textContent = "Registering face...";
            
            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "name=" + encodeURIComponent(name)
            })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => {
                        throw new Error(text);
                    });
                }
                return response.text();
            })
            .then(data => {
                regStatusElement.textContent = data;
                setTimeout(() => {
                    document.getElementById("name-container").style.display = "none";
                    statusElement.textContent = "Registration complete. System is now recognizing faces.";
                }, 2000);
            })
            .catch(error => {
                console.error("Error:", error);
                regStatusElement.textContent = error.message || "Error registering face. Please try again.";
            });
        }

        function startCamera() {
            document.getElementById("video-feed").src = "/video_feed";
            statusElement.textContent = "Camera active. System is recognizing faces.";
        }

        function stopCamera() {
            document.getElementById("video-feed").src = "";
            document.getElementById("name-container").style.display = "none";
            statusElement.textContent = "Camera stopped. Click 'Start Recognition' to begin again.";
        }
        
        function clearAllData() {
            if (confirm("WARNING: This will permanently delete all registered face data. Continue?")) {
                fetch("/clear_data", {
                    method: "POST"
                })
                .then(response => response.text())
                .then(data => {
                    alert(data);
                    statusElement.textContent = "All face data has been cleared.";
                })
                .catch(error => {
                    console.error("Error:", error);
                    alert("Error clearing data. Please try again.");
                });
            }
        }
    </script>
</body>

</html>
